const _matIdx=[];
MATERIALS_DB.forEach(([name,aliases,note,cat])=>{const all=[name,...aliases];const norm=all.map(a=>a.toLowerCase().replace(/[\s.\-_　]/g,""));_matIdx.push({name,aliases:all,normalized:norm,note,cat});});

function lookupMaterial(input){
  if(!input||input.length<1)return null;
  const q=input.toLowerCase().replace(/[\s.\-_　]/g,"");
  for(const m of _matIdx){if(m.normalized.includes(q))return{name:m.name,note:m.note,cat:m.cat,exact:true};}
  const c=[];for(const m of _matIdx){for(const n of m.normalized){if(n.includes(q)||q.includes(n)){c.push({name:m.name,note:m.note,cat:m.cat,score:Math.abs(n.length-q.length)});break;}}}
  if(c.length>0){c.sort((a,b)=>a.score-b.score);return{...c[0],exact:false};}
  return null;
}

function suggestMaterials(input,limit=5){
  if(!input||input.length<1)return[];
  const q=input.toLowerCase().replace(/[\s.\-_　]/g,"");
  const r=[];const seen=new Set();
  for(const m of _matIdx){for(const n of m.normalized){if(n.includes(q)&&!seen.has(m.name)){r.push({name:m.name,note:m.note,cat:m.cat,score:n.indexOf(q)*100+n.length});seen.add(m.name);break;}}}
  r.sort((a,b)=>a.score-b.score);return r.slice(0,limit);
}

function el(tag,attrs,...ch){const e=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==="style"&&typeof v==="object")Object.assign(e.style,v);else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);else if(k==="className")e.className=v;else if(k==="value")e.value=v;else if(k==="disabled"){if(v)e.setAttribute("disabled","");}else if(k==="selected"){if(v)e.setAttribute("selected","");}else if(k==="placeholder")e.placeholder=v;else if(k==="type")e.type=v;else if(k==="min")e.min=v;else if(k==="step")e.step=v;else if(k==="rows")e.rows=v;else e.setAttribute(k,v);});ch.flat(Infinity).forEach(c=>{if(c==null||c===false)return;e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);});return e;}

function makePie(data,size=120,inner=30,outer=52){const cx=size/2,cy=size/2,total=data.reduce((s,d)=>s+d.value,0);if(total===0)return el("div");const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");svg.setAttribute("width",size);svg.setAttribute("height",size);svg.setAttribute("viewBox",`0 0 ${size} ${size}`);let sa=0;data.forEach(d=>{if(d.value===0)return;const a=(d.value/total)*Math.PI*2,ea=sa+a,la=a>Math.PI?1:0;const p=document.createElementNS("http://www.w3.org/2000/svg","path");const c=Math.cos,s=Math.sin,hp=Math.PI/2;p.setAttribute("d",`M${cx+outer*c(sa-hp)},${cy+outer*s(sa-hp)} A${outer},${outer} 0 ${la} 1 ${cx+outer*c(ea-hp)},${cy+outer*s(ea-hp)} L${cx+inner*c(ea-hp)},${cy+inner*s(ea-hp)} A${inner},${inner} 0 ${la} 0 ${cx+inner*c(sa-hp)},${cy+inner*s(sa-hp)} Z`);p.setAttribute("fill",d.color);svg.appendChild(p);sa=ea;});return svg;}
