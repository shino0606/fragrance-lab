<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Δ:anivs 引っ越し</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0D0B09;color:#F0E6D8;font-family:sans-serif;max-width:600px;margin:0 auto;padding:20px;padding-top:max(20px,env(safe-area-inset-top))}
h1{font-size:20px;color:#E8C99B;margin:0 0 8px;font-weight:400;letter-spacing:1px}
p{font-size:13px;color:#B8A898;line-height:1.8;margin-bottom:16px}
textarea{width:100%;height:280px;background:#1A1714;color:#F0E6D8;border:1px solid #2E2720;border-radius:6px;padding:12px;font-size:11px;font-family:monospace}
button{background:#D4A574;color:#0D0B09;border:none;padding:14px 24px;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;margin-top:12px;width:100%}
.count{font-size:14px;color:#6B8F5E;margin-top:10px;text-align:center}
.warn{font-size:12px;color:#C45B4A;line-height:1.7;margin-top:16px;border:1px solid #8B3D30;border-radius:6px;padding:12px}
.step{background:#1A1714;border:1px solid #2E2720;border-radius:6px;padding:14px;margin-bottom:10px;font-size:13px;line-height:1.7}
.step b{color:#E8C99B}
</style>
</head>
<body>
<h1>⚗ Δ:anivs 引っ越しモード</h1>
<p>アプリは新しいサーバーに移転しました。<br>このページで今までのレシピを取り出して、新アプリに引っ越しできます。</p>

<div class="step"><b>① 下のボタンでレシピデータをコピー</b></div>
<textarea id="out" readonly></textarea>
<div class="count" id="count"></div>
<button onclick="copyAll()">📋 全てコピー</button>

<div class="step" style="margin-top:16px"><b>② 新アプリを開く</b><br>
Safariで <b>https://tetra-anivs.com/anivs/</b> を開き、「⚙ 設定 → 旧バージョンからのデータ取り込み」に貼り付けて「取り込む」</div>

<div class="step"><b>③ 新アプリをホーム画面に追加</b><br>
Safariの共有ボタン →「ホーム画面に追加」</div>

<div class="warn">⚠ 引っ越しが完了して新アプリでレシピが見えることを確認するまで、このホーム画面アイコンは削除しないでください。削除するとデータも消えます。</div>

<script>
const raw=localStorage.getItem("anivs-recipes")||localStorage.getItem("fragrance-recipes-v2")||"[]";
let recipes=[];
try{recipes=JSON.parse(raw);}catch(e){}
document.getElementById("out").value=JSON.stringify(recipes);
document.getElementById("count").textContent=recipes.length+"件のレシピが見つかりました";
function copyAll(){
  const ta=document.getElementById("out");
  ta.select();ta.setSelectionRange(0,9999999);
  if(navigator.clipboard){navigator.clipboard.writeText(ta.value).then(()=>alert("コピーしました！\n新アプリの設定画面に貼り付けてください"));}
  else{document.execCommand("copy");alert("コピーしました");}
}
</script>
</body>
</html>
