<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Δ:anivs 引っ越しヘルパー</title>
<style>
body{background:#0D0B09;color:#F0E6D8;font-family:sans-serif;max-width:600px;margin:0 auto;padding:20px}
h1{font-size:18px;color:#E8C99B;margin-bottom:12px}
p{font-size:13px;color:#B8A898;line-height:1.7;margin-bottom:16px}
textarea{width:100%;height:300px;background:#1A1714;color:#F0E6D8;border:1px solid #2E2720;border-radius:6px;padding:12px;font-size:11px;font-family:monospace;box-sizing:border-box}
button{background:#D4A574;color:#0D0B09;border:none;padding:12px 24px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-top:12px;width:100%}
.count{font-size:13px;color:#6B8F5E;margin-top:8px}
</style>
</head>
<body>
<h1>⚗ Δ:anivs 引っ越しヘルパー</h1>
<p>このページは、旧アプリに保存されているレシピデータを取り出すためのものです。<br>
下のボックスの内容を全てコピーして、新アプリの「⚙ 設定 → 旧バージョンからのデータ取り込み」に貼り付けてください。</p>
<textarea id="out" readonly></textarea>
<div class="count" id="count"></div>
<button onclick="copy()">📋 全てコピー</button>
<script>
const raw=localStorage.getItem("anivs-recipes")||localStorage.getItem("fragrance-recipes-v2")||"[]";
let recipes=[];
try{recipes=JSON.parse(raw);}catch(e){}
document.getElementById("out").value=JSON.stringify(recipes,null,1);
document.getElementById("count").textContent=recipes.length+"件のレシピが見つかりました";
function copy(){
  const ta=document.getElementById("out");
  ta.select();ta.setSelectionRange(0,999999);
  navigator.clipboard?navigator.clipboard.writeText(ta.value).then(()=>alert("コピーしました")):document.execCommand("copy");
}
</script>
</body>
</html>
